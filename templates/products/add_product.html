{% extends 'base/base.html' %}

{% block title %}
Add Product
{% endblock %}


{% block content %}
<section>
    <div class="card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
                {% include 'base/includes/basicFormField.html' %}
            {% endfor %}
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
</section>
{% endblock %}
