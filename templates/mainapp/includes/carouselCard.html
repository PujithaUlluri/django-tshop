<div class="col-xl-3 col-lg-4 col-md-6 mb-4">

    <div class="card h-100 border-0 shadow rounded-3 overflow-hidden">

        <!-- Image Section -->
        <div class="position-relative">
            <img src="{{ carousel_image.image.url }}"
                 class="w-100"
                 style="height: 180px; object-fit: cover;"
                 alt="{{ carousel_image.title }}">
        </div>

        <div class="card-body d-flex flex-column">

            <h6 class="fw-bold text-dark mb-2">
                {{ carousel_image.title|title }}
            </h6>

            <p class="text-secondary small flex-grow-1">
                {{ carousel_image.caption|truncatewords:12 }}
            </p>

            <!-- Action Buttons -->
            <div class="d-flex justify-content-between mt-3">

                <a href="#" class="btn btn-sm btn-success px-3">
                    Update
                </a>

                <a href="#" class="btn btn-sm btn-danger px-3">
                    Delete
                </a>

            </div>

        </div>
    </div>

</div>
